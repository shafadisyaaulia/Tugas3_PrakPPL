{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2 class="fw-bold mb-5">Katalog Produk Unggulan</h2>
    
    <div class="row"> {% for p in semua_produk %}
        <div class="col-md-4 col-sm-6 mb-4"> <div class="card h-100 shadow-sm">
                <img src="{{ p.gambar }}" class="card-img-top" alt="{{ p.nama }}" style="height: 220px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold mb-1">{{ p.nama }}</h5>
                    <p class="text-primary fw-bold fs-5 mb-3">{{ p.harga }}</p>
                    <p class="text-muted small">{{ p.deskripsi|truncatewords:8 }}</p>
                    <a href="/produk/{{ p.id }}/" class="btn btn-outline-primary mt-auto">Detail Produk</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
