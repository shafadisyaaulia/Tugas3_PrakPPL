<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #212529; }
        .navbar { background-color: #ffffff; border-bottom: 1px solid #e0e0e0; }
        .navbar-brand { font-weight: 700; color: #0d6efd !important; letter-spacing: -1px; }
        .nav-link { color: #495057 !important; font-weight: 500; }
        .nav-link:hover { color: #0d6efd !important; }
        .card { border: none; border-radius: 12px; transition: all 0.3s ease; background: #fff; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #0d6efd; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; }
        .hero-section { padding: 80px 0; background: #ffffff; border-bottom: 1px solid #e0e0e0; }
    </style>
    <title>{% block title %}TechStore{% endblock %}</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <a class="navbar-brand" href="/">TECHSTORE</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link mx-2" href="/">Home</a>
                <a class="nav-link mx-2" href="/produk/">Katalog</a>
                <a class="nav-link mx-2" href="/kontak/">Bantuan</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="container text-center mt-5 py-5 border-top">
        <p class="text-muted small">&copy; 2026 TechStore Indonesia. Dibuat untuk Tugas Praktikum Django.</p>
    </footer>
</body>
</html>
