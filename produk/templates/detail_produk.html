{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-lg p-0 border-0">
                <div class="row g-0">
                    <div class="col-md-6">
                        <img src="{{ produk.gambar }}" class="img-fluid w-100 h-100" style="object-fit: cover; min-height: 400px;" alt="...">
                    </div>
                    <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
                        <h6 class="text-primary fw-bold text-uppercase small mb-2">Original Hardware</h6>
                        <h1 class="fw-bold mb-3">{{ produk.nama }}</h1>
                        <h2 class="text-success fw-bold mb-4">{{ produk.harga }}</h2>
                        <p class="text-muted lh-lg mb-5">{{ produk.deskripsi }}</p>
                        <div class="d-grid">
                            <button class="btn btn-primary py-3 fw-bold">Tambahkan ke Keranjang</button>
                            <a href="/produk/" class="btn btn-link text-muted mt-2">Kembali ke Katalog</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
